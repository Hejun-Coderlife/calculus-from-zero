<script>
const TAU=Math.PI*2;
const INK='#1d1d1f',BLUE='#0071e3',IND='#5e5ce6',PINK='#ff2d55',GREEN='#28a745',SOFT='#86868b',RED='#e11d0f';
let LANG='zh';
function TT(zh,en){return LANG==='en'?en:zh;}
function dpr(){return Math.min(window.devicePixelRatio||1,2);}
function setup(cv,cssH){const r=dpr();const cssW=cv.clientWidth||cv.width;cv.width=cssW*r;cv.height=cssH*r;cv.style.height=cssH+'px';
  const ctx=cv.getContext('2d');ctx.setTransform(r,0,0,r,0,0);return{ctx,w:cssW,h:cssH};}
function ffont(){return getComputedStyle(document.body).fontFamily;}
let limA=160,limB=340;
function drawLim(){
  const cv=document.getElementById('cLim');if(!cv)return;
  const {ctx,w,h}=setup(cv,420);ctx.clearRect(0,0,w,h);
  const ff=ffont();
  let t1=limA/100,t2=limB/100; if(t2<t1+0.01)t2=t1+0.01;   // 0.01精度：缝能缩到0.01(两球几乎重合)；滑块都是0.01整数倍，走了(4位小数)÷用了=平均，精确自洽
  const groundY=h-26;
  ctx.fillStyle='#eceef2';ctx.fillRect(0,groundY,w,h-groundY);
  ctx.strokeStyle='#d3d6db';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,groundY+.5);ctx.lineTo(w,groundY+.5);ctx.stroke();
  const A={x:72,y:82},B={x:344,y:groundY-4};
  const dx=B.x-A.x,dy=B.y-A.y,len=Math.hypot(dx,dy),ux=dx/len,uy=dy/len,dnx=-uy,dny=ux,th=13;
  ctx.fillStyle='#c9a86e';ctx.fillRect(A.x-9,A.y+2,18,groundY-A.y-2);
  ctx.strokeStyle='rgba(110,80,45,.4)';ctx.lineWidth=1;ctx.strokeRect(A.x-9,A.y+2,18,groundY-A.y-2);
  ctx.beginPath();ctx.moveTo(A.x,A.y);ctx.lineTo(B.x,B.y);ctx.lineTo(B.x+th*dnx,B.y+th*dny);ctx.lineTo(A.x+th*dnx,A.y+th*dny);ctx.closePath();
  const wgd=ctx.createLinearGradient(A.x,A.y,A.x+th*dnx,A.y+th*dny);wgd.addColorStop(0,'#b98a52');wgd.addColorStop(1,'#875c32');
  ctx.fillStyle=wgd;ctx.fill();ctx.strokeStyle='rgba(90,60,30,.5)';ctx.lineWidth=1;ctx.stroke();
  const pos=f=>({x:A.x+dx*f,y:A.y+dy*f});
  const pA=pos(t1*t1/16),pB=pos(t2*t2/16),upx=-dnx,upy=-dny,ballR=11;
  ctx.strokeStyle='rgba(224,144,10,.7)';ctx.lineWidth=8;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(pA.x-4*dnx,pA.y-4*dny);ctx.lineTo(pB.x-4*dnx,pB.y-4*dny);ctx.stroke();ctx.lineCap='butt';
  const aC={x:pA.x+ballR*upx,y:pA.y+ballR*upy},bC={x:pB.x+ballR*upx,y:pB.y+ballR*upy};
  ctx.fillStyle='#fff';ctx.strokeStyle='#c47f00';ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(aC.x,aC.y,ballR-1,0,TAU);ctx.fill();ctx.stroke();
  const bg=ctx.createRadialGradient(bC.x-4,bC.y-4,1,bC.x,bC.y,ballR);bg.addColorStop(0,'#f2f4f7');bg.addColorStop(.55,'#b6bcc6');bg.addColorStop(1,'#666a73');
  ctx.fillStyle=bg;ctx.beginPath();ctx.arc(bC.x,bC.y,ballR,0,TAU);ctx.fill();
  ctx.fillStyle=SOFT;ctx.font='700 11px '+ff;ctx.textAlign='center';ctx.textBaseline='bottom';
  ctx.fillText(TT('起点 第'+t1.toFixed(2)+'份','start '+t1.toFixed(2)),aC.x+13*upx,aC.y+13*upy-ballR);
  ctx.fillText(TT('终点 第'+t2.toFixed(2)+'份','end '+t2.toFixed(2)),bC.x+13*upx,bC.y+13*upy-ballR);
  const cupW=60,cupX=w-92,cupYt=150,cupB=groundY-4,cupH=cupB-cupYt;
  const y1w=cupB-cupH*(t1/4),y2w=cupB-cupH*(t2/4);
  ctx.fillStyle='rgba(0,140,220,.2)';ctx.fillRect(cupX+2.5,y1w,cupW-5,cupB-y1w-2.5);
  ctx.fillStyle='rgba(224,144,10,.4)';ctx.fillRect(cupX+2.5,y2w,cupW-5,y1w-y2w);
  ctx.strokeStyle='#8a8f98';ctx.lineWidth=2.5;ctx.beginPath();ctx.moveTo(cupX,cupYt);ctx.lineTo(cupX,cupB);ctx.lineTo(cupX+cupW,cupB);ctx.lineTo(cupX+cupW,cupYt);ctx.stroke();
  ctx.fillStyle='#c47f00';ctx.font='700 10.5px '+ff;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(TT('用的时间','time used'),cupX+cupW/2,(y1w+y2w)/2);
  ctx.fillStyle=SOFT;ctx.font='600 10px '+ff;ctx.textAlign='center';ctx.textBaseline='bottom';ctx.fillText(TT('水钟','clock'),cupX+cupW/2,cupYt-4);
  const D=(t2*t2-t1*t1),T=(t2-t1),V=(t1+t2);
  const near=(t2-t1)<=0.05;
  const out=document.getElementById('limOut');
  if(out)out.innerHTML=TT(
   '这一小段：从第 <b>'+t1.toFixed(2)+'</b> 份到第 <b>'+t2.toFixed(2)+'</b> 份 —— 走了 <b>'+(+D.toFixed(4))+'</b> 份、用了 <b>'+(+T.toFixed(2))+'</b> 份。<br>平均 ＝ 走的 ÷ 用的 ＝ <b class="bl">'+V.toFixed(2)+'</b>。<br>'+(near?'<span class="note">缩到<b>几乎一点</b>了 —— 平均 <b class="bl">'+V.toFixed(2)+'</b> 只比真值高了<b>一条缝</b>（'+(+T.toFixed(2))+'）。缝再缩到 0，就精确到第 '+t1.toFixed(2)+' 份的 <b style="color:#c47f00;font-size:1.05em">此刻速度 ＝ '+(2*t1).toFixed(2)+'</b>。</span>':'<span class="note">现在这段还很宽 —— 平均 <b class="bl">'+V.toFixed(2)+'</b> 只是<b>这一大段的平均</b>，还<b>不是</b>极限。把<b>终点往起点拖</b>缩短它，平均会一路<b>往下贴</b>，越缩越逼近第 '+t1.toFixed(2)+' 份那一刻的<b>此刻速度</b>。</span>'),
   'This tiny stretch: unit <b>'+t1.toFixed(2)+'</b> → <b>'+t2.toFixed(2)+'</b> — went <b>'+(+D.toFixed(4))+'</b>, took <b>'+(+T.toFixed(2))+'</b>.<br>average ＝ distance ÷ time ＝ <b class="bl">'+V.toFixed(2)+'</b>.<br>'+(near?'<span class="note">Shrunk to <b>almost a point</b> — the average <b class="bl">'+V.toFixed(2)+'</b> sits just <b>one gap</b> ('+(+T.toFixed(2))+') above the true value. Shrink the gap to 0 and it’s exactly the <b style="color:#c47f00;font-size:1.05em">instant speed ＝ '+(2*t1).toFixed(2)+'</b> at unit '+t1.toFixed(2)+'.</span>':'<span class="note">This stretch is still wide — the average <b class="bl">'+V.toFixed(2)+'</b> is just <b>the average over a big stretch</b>, <b>not</b> the limit. Drag the <b>end toward the start</b> to shrink it: the average slides <b>down</b>, approaching the <b>instant speed</b> at unit '+t1.toFixed(2)+'.</span>'));
}
// ==== 第8屏：弯道·速度不匀（本章结尾悬念，自动来回滚）====
let crvCtx=null,crvW=0,crvH=0,crvInView=false,crvRAF=null,crvT0=0,crvReduce=false;
function crvSetup(){
  const cv=document.getElementById('cCurve');if(!cv)return false;
  const r=dpr(),cssW=cv.clientWidth||cv.width,cssH=360;
  cv.width=cssW*r;cv.height=cssH*r;cv.style.height=cssH+'px';
  crvCtx=cv.getContext('2d');crvCtx.setTransform(r,0,0,r,0,0);crvW=cssW;crvH=cssH;return true;
}
function crvScene(phase){
  const ctx=crvCtx;if(!ctx)return;const w=crvW,ff=ffont();
  ctx.clearRect(0,0,w,crvH);
  const groundY=crvH-22;
  ctx.fillStyle='#eceef2';ctx.fillRect(0,groundY,w,crvH-groundY);
  ctx.strokeStyle='#d3d6db';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,groundY+.5);ctx.lineTo(w,groundY+.5);ctx.stroke();
  const X0=64,X1=w-64,topY=64,botY=groundY-34;
  const cx=p=>X0+(X1-X0)*p, cy=p=>topY+(botY-topY)*(1-Math.pow(2*p-1,2));
  ctx.strokeStyle='#b98a52';ctx.lineWidth=11;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.beginPath();for(let i=0;i<=90;i++){const p=i/90;i?ctx.lineTo(cx(p),cy(p)):ctx.moveTo(cx(p),cy(p));}ctx.stroke();
  ctx.strokeStyle='rgba(120,85,45,.45)';ctx.lineWidth=1.3;
  ctx.beginPath();for(let i=0;i<=90;i++){const p=i/90;i?ctx.lineTo(cx(p),cy(p)-5):ctx.moveTo(cx(p),cy(p)-5);}ctx.stroke();
  ctx.lineCap='butt';
  const p=(1-Math.cos(phase))/2, bx=cx(p),by=cy(p);
  const dp=0.003,txv=cx(p+dp)-cx(p-dp),tyv=cy(p+dp)-cy(p-dp),tl=Math.hypot(txv,tyv)||1,ux=txv/tl,uy=tyv/tl;
  let nx=-uy,ny=ux; if(ny>0){nx=-nx;ny=-ny;}
  const ballR=12,bcx=bx+nx*ballR,bcy=by+ny*ballR;
  const drop=cy(p)-topY,span=botY-topY,vn=Math.sqrt(Math.max(0,drop)/span);
  const dir=Math.sin(phase)>=0?1:-1,vdx=dir*ux,vdy=dir*uy,aLen=6+vn*54;
  if(aLen>9){const ax=bcx+vdx*aLen,ay=bcy+vdy*aLen,px=-vdy,py=vdx;
    ctx.strokeStyle='#e0900a';ctx.fillStyle='#e0900a';ctx.lineWidth=3.4;
    ctx.beginPath();ctx.moveTo(bcx,bcy);ctx.lineTo(ax,ay);ctx.stroke();
    ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(ax-vdx*9+px*5,ay-vdy*9+py*5);ctx.lineTo(ax-vdx*9-px*5,ay-vdy*9-py*5);ctx.closePath();ctx.fill();}
  const g=ctx.createRadialGradient(bcx-4,bcy-4,1,bcx,bcy,ballR);g.addColorStop(0,'#f2f4f7');g.addColorStop(.55,'#b6bcc6');g.addColorStop(1,'#666a73');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(bcx,bcy,ballR,0,TAU);ctx.fill();
  ctx.fillStyle='#c47f00';ctx.font='700 12.5px '+ff;ctx.textAlign='center';ctx.textBaseline='bottom';ctx.fillText(TT('此刻速度','speed now'),bcx,bcy-ballR-6);
}
function crvFrame(now){
  if(!crvInView){crvRAF=null;return;}
  if(!crvT0)crvT0=now;
  const CYC=4600,phase=((now-crvT0)%CYC)/CYC*TAU;
  crvScene(phase);crvRAF=requestAnimationFrame(crvFrame);
}
function crvPlay(){if(crvReduce){if(crvSetup())crvScene(1.4);return;}if(crvRAF)return;crvT0=0;crvRAF=requestAnimationFrame(crvFrame);}
function crvStop(){if(crvRAF){cancelAnimationFrame(crvRAF);crvRAF=null;}}
function drawCurve(){if(crvSetup()&&(crvReduce||!crvInView))crvScene(1.4);}
// ==== 第3屏：放大变直（曲线放大 → 逼近直线/切线）====
let zmCtx=null,zmW=0,zmH=0,zmIn=false,zmRAF=null,zmT0=0,zmReduce=false;
function zoomSetup(){
  const cv=document.getElementById('cZoom');if(!cv)return false;
  const r=dpr(),cssW=cv.clientWidth||cv.width,cssH=380;
  cv.width=cssW*r;cv.height=cssH*r;cv.style.height=cssH+'px';
  zmCtx=cv.getContext('2d');zmCtx.setTransform(r,0,0,r,0,0);zmW=cssW;zmH=cssH;return true;
}
function zoomScene(u){                 // u: 0=整条曲线, 1=放到最大(近乎直线)
  const ctx=zmCtx;if(!ctx)return;const w=zmW,h=zmH,ff=ffont();
  ctx.clearRect(0,0,w,h);
  const z=Math.pow(46,u);                       // 放大倍数 1 → 46
  const a=0.45,x0=1,fx=x=>a*x*x,slope=2*a*x0,f0=fx(x0);
  const midX=w/2,midY=h/2+26,baseHW=1.5,ppw=(w-96)/(2*baseHW)*z;   // 每单位世界坐标占多少像素(等比放大)
  const syv=wy=>midY-(wy-f0)*ppw;
  // 切线（虚线，始终过中心 P，永远是直的）
  const tyAt=px=>{const wx=x0+(px-midX)/ppw;return syv(f0+slope*(wx-x0));};
  ctx.strokeStyle='rgba(224,144,10,.85)';ctx.lineWidth=2.4;ctx.setLineDash([7,6]);
  ctx.beginPath();ctx.moveTo(48,tyAt(48));ctx.lineTo(w-48,tyAt(w-48));ctx.stroke();ctx.setLineDash([]);
  // 曲线（蓝，放大后越来越贴住切线）
  ctx.strokeStyle=BLUE;ctx.lineWidth=3.4;ctx.beginPath();let started=false;
  for(let px=48;px<=w-48;px+=2){const wx=x0+(px-midX)/ppw,yy=syv(fx(wx));
    if(yy<-40||yy>h+40){started=false;continue;}
    started?ctx.lineTo(px,yy):ctx.moveTo(px,yy);started=true;}
  ctx.stroke();
  // P 点（画面中心）
  ctx.fillStyle='#fff';ctx.strokeStyle=BLUE;ctx.lineWidth=2.6;ctx.beginPath();ctx.arc(midX,midY,6.5,0,TAU);ctx.fill();ctx.stroke();
  ctx.fillStyle=BLUE;ctx.font='700 12px '+ff;ctx.textAlign='left';ctx.textBaseline='top';ctx.fillText(TT('此刻这点','this point'),midX+11,midY+8);
  // 放大倍数
  ctx.fillStyle=SOFT;ctx.font='700 14px '+ff;ctx.textAlign='left';ctx.textBaseline='top';ctx.fillText(TT('放大 ×','zoom ×')+(z<9.5?z.toFixed(1):Math.round(z)),50,20);
  // 状态标签
  const straight=u>0.72;
  ctx.fillStyle='#c47f00';ctx.font='700 15px '+ff;ctx.textAlign='center';ctx.textBaseline='bottom';
  ctx.fillText(straight?TT('几乎成直线了 —— 这条直线就是「切线」','almost a straight line — this line is the tangent'):TT('放大中…… 弯曲的曲线正在变直','zooming in… the curved line is straightening'),w/2,h-14);
}
function zoomFrame(now){
  if(!zmIn){zmRAF=null;return;}
  if(!zmT0)zmT0=now;
  const UP=3600,HOLD=1200,CYC=UP+HOLD,tt=(now-zmT0)%CYC;
  zoomScene(tt<UP?tt/UP:1);zmRAF=requestAnimationFrame(zoomFrame);
}
function zoomPlay(){if(zmReduce){if(zoomSetup())zoomScene(1);return;}if(zmRAF)return;zmT0=0;zmRAF=requestAnimationFrame(zoomFrame);}
function zoomStop(){if(zmRAF){cancelAnimationFrame(zmRAF);zmRAF=null;}}
function drawZoom(){if(zoomSetup()&&(zmReduce||!zmIn))zoomScene(zmReduce?1:0);}

function applyLang(){
  document.documentElement.lang=LANG;document.title=I18N.title[LANG];
  document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.getAttribute('data-i18n');if(I18N[k])el.innerHTML=I18N[k][LANG];});
  document.getElementById('langBtn').textContent=LANG==='zh'?'EN':'中';
  drawCurve();drawLim();drawZoom();
}
function initAll(){
  drawCurve();drawLim();drawZoom();
  crvReduce=zmReduce=!!(window.matchMedia&&matchMedia('(prefers-reduced-motion:reduce)').matches);
  {const cCv=document.getElementById('cCurve');
   if(cCv&&'IntersectionObserver' in window){new IntersectionObserver(es=>{crvInView=es[0].isIntersecting;if(crvInView)crvPlay();else crvStop();},{threshold:.3}).observe(cCv);}
   else{crvInView=true;crvPlay();}}
  {const cZ=document.getElementById('cZoom');
   if(cZ&&'IntersectionObserver' in window){new IntersectionObserver(es=>{zmIn=es[0].isIntersecting;if(zmIn)zoomPlay();else zoomStop();},{threshold:.3}).observe(cZ);}
   else{zmIn=true;zoomPlay();}}
  {const a=document.getElementById('limA'),b=document.getElementById('limB');const r=()=>requestAnimationFrame(drawLim);if(a)a.addEventListener('input',()=>{limA=+a.value;r();});if(b)b.addEventListener('input',()=>{limB=+b.value;r();});}
  document.getElementById('langBtn').addEventListener('click',()=>{LANG=(LANG==='zh'?'en':'zh');applyLang();});
  const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('in');}),{threshold:.12});
  document.querySelectorAll('.reveal').forEach(el=>io.observe(el));
  const lastPanel=document.querySelector('.panel:last-of-type');
  new IntersectionObserver(es=>{const hint=document.querySelector('.hint');if(hint)hint.style.display=es[0].isIntersecting?'none':'';},{threshold:.5}).observe(lastPanel);
  addEventListener('resize',()=>{drawCurve();drawLim();drawZoom();});
  addEventListener('scroll',()=>{const hint=document.querySelector('.hint');if(hint&&hint.style.display!=='none')hint.style.opacity=scrollY>200?'0':'';},{passive:true});
  applyLang();
}
initAll();
