<!doctype html>
<html lang="zh"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>从 0 开始的微积分</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='24' fill='%23070713'/><circle cx='50' cy='50' r='30' fill='none' stroke='%237aa2ff' stroke-width='6'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--sans:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter","PingFang SC",sans-serif}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:#05050d;color:#eef1ff;font-family:var(--sans);-webkit-font-smoothing:antialiased;overflow-x:hidden;
    /* WebGL 失败时的兜底星云 */
    background-image:radial-gradient(1200px 700px at 22% 18%,rgba(90,50,180,.35),transparent 60%),
      radial-gradient(1000px 700px at 82% 78%,rgba(30,90,190,.32),transparent 60%),
      radial-gradient(900px 600px at 60% 40%,rgba(150,40,120,.18),transparent 60%),
      radial-gradient(circle at 50% 50%,#0a0a1c,#05050d 70%);}
  #sky{position:fixed;inset:0;width:100%;height:100%;z-index:0;display:block}
  .wrap{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:88px 22px 72px;text-align:center;gap:14px}
  .eyebrow{font-size:13px;font-weight:600;letter-spacing:.24em;text-transform:uppercase;color:#9fb0ff;opacity:.9}
  h1{font-size:clamp(40px,8vw,92px);font-weight:800;letter-spacing:-.03em;line-height:1.02;
    background:linear-gradient(180deg,#ffffff,#b9c6ff 70%,#8ea0ff);-webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 0 42px rgba(120,150,255,.35)}
  .lede{font-size:clamp(16px,2.2vw,21px);font-weight:400;color:#aab3d8;max-width:24em;line-height:1.5;margin-bottom:20px}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:18px;width:min(940px,94vw);margin-top:6px}
  .card{position:relative;display:flex;flex-direction:column;align-items:flex-start;gap:6px;text-align:left;
    padding:22px 22px 24px;border-radius:20px;text-decoration:none;color:inherit;overflow:hidden;
    background:linear-gradient(160deg,rgba(255,255,255,.10),rgba(255,255,255,.03));
    border:1px solid rgba(255,255,255,.14);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    box-shadow:0 10px 40px rgba(0,0,0,.35);transition:transform .3s cubic-bezier(.22,.61,.36,1),box-shadow .3s,border-color .3s}
  a.card{cursor:pointer}
  a.card:hover{transform:translateY(-6px);border-color:rgba(150,175,255,.55);box-shadow:0 18px 60px rgba(70,90,220,.4),0 0 0 1px rgba(150,175,255,.25) inset}
  .card .cn{font-size:13px;font-weight:700;letter-spacing:.14em;color:#8ea0ff}
  .card .ct{font-size:23px;font-weight:700;letter-spacing:-.02em;color:#fff}
  .card .cd{font-size:14px;font-weight:400;color:#a6b0d8;line-height:1.4}
  .card .arrow{position:absolute;right:20px;bottom:20px;font-size:18px;color:#8ea0ff;opacity:0;transform:translateX(-4px);transition:.3s}
  a.card:hover .arrow{opacity:1;transform:none}
  .card.wip{opacity:.62}
  .card .badge{position:absolute;top:16px;right:16px;font-size:11px;font-weight:600;letter-spacing:.04em;color:#cdd6ff;
    background:rgba(140,160,255,.16);border:1px solid rgba(140,160,255,.3);border-radius:99px;padding:3px 10px}
  .langbtn{position:fixed;top:16px;right:16px;z-index:3;font-size:13px;font-weight:600;color:#cdd6ff;
    background:rgba(255,255,255,.08);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,.2);border-radius:980px;padding:6px 15px;cursor:pointer;transition:color .2s,background .2s}
  .langbtn:hover{color:#fff;background:rgba(255,255,255,.16)}
  .foot{margin-top:30px;font-size:12px;color:#6f7aa8;letter-spacing:.02em}
</style></head>
<body>
<canvas id="sky"></canvas>
<button id="langBtn" class="langbtn">EN</button>
<div class="wrap">
  <div class="eyebrow" id="eyebrow">FROM ZERO</div>
  <h1 id="title">从 0 开始的微积分</h1>
  <div class="lede" id="lede">不背公式。从图形出发，一步步把它长出来。</div>
  <div class="grid" id="grid"></div>
  <div class="foot" id="foot">拖动、滑动、亲手数一数 —— 每一章都能玩。</div>
</div>
<script>
let LANG='zh';
function TT(zh,en){return LANG==='en'?en:zh;}
const CH=[
  {n:'01',file:'ch01.html',done:true, zh:['圆的面积','数格子，逼近 π'],            en:['Area of a Circle','count squares → π']},
  {n:'02',file:'ch02.html',done:false,zh:['瞬时速度','变速的车，某一刻多快？'],      en:['Instant Speed','a speeding car — how fast right now?']},
];
const T={
  eyebrow:{zh:'FROM ZERO',en:'FROM ZERO'},
  title:{zh:'从 0 开始的微积分',en:'Calculus from Zero'},
  lede:{zh:'不背公式。从图形出发，一步步把它长出来。',en:'No memorizing. Start from shapes and grow every formula, step by step.'},
  foot:{zh:'拖动、滑动、亲手数一数 —— 每一章都能玩。',en:'Drag, slide, count it yourself — every chapter is interactive.'},
};
function render(){
  document.documentElement.lang=LANG;
  document.getElementById('eyebrow').textContent=T.eyebrow[LANG];
  document.getElementById('title').textContent=T.title[LANG];
  document.getElementById('lede').textContent=T.lede[LANG];
  document.getElementById('foot').textContent=T.foot[LANG];
  document.getElementById('langBtn').textContent=LANG==='zh'?'EN':'中';
  const g=document.getElementById('grid');g.innerHTML='';
  CH.forEach(c=>{
    const t=c[LANG][0],d=c[LANG][1];
    const el=document.createElement(c.file?'a':'div');
    if(c.file)el.href=c.file;
    el.className='card'+(c.done?'':' wip');
    el.innerHTML='<span class="cn">'+c.n+'</span><span class="ct">'+t+'</span><span class="cd">'+d+'</span>'
      +'<span class="arrow">→</span>'+(c.done?'':'<span class="badge">'+TT('建设中','WIP')+'</span>');
    g.appendChild(el);
  });
}
document.getElementById('langBtn').addEventListener('click',()=>{LANG=(LANG==='zh'?'en':'zh');render();});
render();

/* ---------- WebGL 星际背景（全在 GPU；降分辨率省性能；无 shadowBlur） ---------- */
(function(){
  const cv=document.getElementById('sky');
  const gl=cv.getContext('webgl')||cv.getContext('experimental-webgl');
  if(!gl){return;}  // 保留 CSS 兜底星云
  const vs='attribute vec2 a;void main(){gl_Position=vec4(a,0.,1.);}';
  const fs=[
  'precision highp float;',
  'uniform vec2 u_res;uniform float u_time;',
  'float hash(vec2 p){p=fract(p*vec2(123.34,345.45));p+=dot(p,p+34.345);return fract(p.x*p.y);}',
  'float noise(vec2 p){vec2 i=floor(p),f=fract(p);vec2 u=f*f*(3.-2.*f);',
  ' float a=hash(i),b=hash(i+vec2(1,0)),c=hash(i+vec2(0,1)),d=hash(i+vec2(1,1));',
  ' return mix(mix(a,b,u.x),mix(c,d,u.x),u.y);}',
  'float fbm(vec2 p){float v=0.,a=.5;for(int i=0;i<4;i++){v+=a*noise(p);p*=2.03;a*=.5;}return v;}',
  'void main(){',
  ' vec2 p=(gl_FragCoord.xy-.5*u_res)/u_res.y;',
  ' float t=u_time*0.015;',
  ' vec2 q=p*1.4+vec2(t*0.4,t*0.15);',
  ' float w=fbm(q+0.6*fbm(q*0.6-t));',            // 星云（域扭曲）
  ' vec3 col=vec3(0.015,0.016,0.045);',
  ' vec3 neb=mix(vec3(0.16,0.06,0.34),vec3(0.62,0.16,0.5),w);',
  ' neb=mix(neb,vec3(0.10,0.28,0.66),fbm(q*1.25-t*0.4));',
  ' col+=neb*pow(w,2.2)*1.05;',
  ' for(float l=0.;l<3.;l++){',                    // 三层星星（视差 + 闪烁）
  '   float sc=mix(150.,430.,l/2.);',
  '   vec2 gp=p*sc+vec2(l*23.-t*(8.+l*6.),l*17.);',
  '   vec2 id=floor(gp);float h=hash(id+l*11.3);',
  '   if(h>0.87){float d=length(fract(gp)-.5);',
  '     float tw=0.55+0.45*sin(u_time*(1.2+h*3.)+h*40.);',
  '     col+=vec3(0.85,0.9,1.0)*smoothstep(0.13,0.0,d)*tw*(0.5+0.5*h);}}',
  ' col*=1.0-0.55*dot(p,p);',                      // 暗角
  ' col=pow(col,vec3(0.85));',
  ' gl_FragColor=vec4(col,1.0);',
  '}'].join('\n');
  function sh(type,src){const s=gl.createShader(type);gl.shaderSource(s,src);gl.compileShader(s);
    if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)){console.warn(gl.getShaderInfoLog(s));return null;}return s;}
  const vsh=sh(gl.VERTEX_SHADER,vs),fsh=sh(gl.FRAGMENT_SHADER,fs);
  if(!vsh||!fsh){return;}
  const prog=gl.createProgram();gl.attachShader(prog,vsh);gl.attachShader(prog,fsh);gl.linkProgram(prog);
  if(!gl.getProgramParameter(prog,gl.LINK_STATUS)){return;}
  gl.useProgram(prog);
  const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);
  const la=gl.getAttribLocation(prog,'a');gl.enableVertexAttribArray(la);gl.vertexAttribPointer(la,2,gl.FLOAT,false,0,0);
  const uRes=gl.getUniformLocation(prog,'u_res'),uTime=gl.getUniformLocation(prog,'u_time');
  const SCALE=0.7;  // 降分辨率渲染，弱机也流畅
  function resize(){const w=Math.max(1,Math.floor(innerWidth*SCALE)),h=Math.max(1,Math.floor(innerHeight*SCALE));
    cv.width=w;cv.height=h;gl.viewport(0,0,w,h);}
  resize();addEventListener('resize',resize);
  const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  let start=performance.now(),running=true;
  function frame(now){const t=(now-start)/1000;
    gl.uniform2f(uRes,cv.width,cv.height);gl.uniform1f(uTime,t);
    gl.drawArrays(gl.TRIANGLES,0,3);
    if(running&&!reduce)requestAnimationFrame(frame);}
  requestAnimationFrame(frame);
  document.addEventListener('visibilitychange',()=>{running=!document.hidden;if(running&&!reduce){start=performance.now()-0;requestAnimationFrame(frame);}});
})();
</script>
</body></html>
